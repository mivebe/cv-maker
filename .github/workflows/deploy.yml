name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-progress one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cv-maker
        uses: actions/checkout@v4

      # cv-maker depends on `@mivebe/icons` via `file:../icons`, so the sibling
      # repo has to sit next to this one before `npm ci`. Its dist/ and svg/ are
      # committed, so no build step is needed - a shallow clone is enough.
      # icons is private, so authenticate with a PAT (repo-read scope) stored as
      # the ICONS_PAT secret. The default GITHUB_TOKEN can't read a second repo.
      - name: Clone @mivebe/icons as a sibling
        run: git clone --depth 1 https://x-access-token:${{ secrets.ICONS_PAT }}@github.com/mivebe/icons.git ../icons

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
